<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32-C3 — Sơ Đồ Mạch Xe Máy All-in-One</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060e1a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const C = {
      v12: '#ef4444', v5: '#f97316', v33: '#ec4899',
      gnd: '#64748b', rpm: '#3b82f6', volt: '#22c55e',
      ntc: '#0ea5e9', led: '#a855f7', pulse: '#eab308',
      touch: '#06b6d4', bg: '#060e1a', card: '#0d1b2e',
      ok: '#22c55e', warn: '#f59e0b',
    };

    function Tag({ color, children }) {
      return (
        <span style={{
          background: color + '22', color, border: `1px solid ${color}44`,
          borderRadius: 4, padding: '1px 7px', fontSize: 11, fontWeight: 'bold',
          fontFamily: 'monospace', whiteSpace: 'nowrap'
        }}>{children}</span>
      );
    }

    function Section({ title, color, children }) {
      return (
        <div style={{
          border: `1px solid ${color}55`, borderRadius: 10,
          overflow: 'hidden', marginBottom: 12,
        }}>
          <div style={{
            background: color + '18', borderBottom: `1px solid ${color}33`,
            padding: '7px 14px', fontSize: 12, fontWeight: 'bold', color,
            letterSpacing: 1
          }}>{title}</div>
          <div style={{ padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
            {children}
          </div>
        </div>
      );
    }

    function Row({ from, to, wire, note, updated }) {
      return (
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 30px 1fr 1fr',
          alignItems: 'center', gap: 8, padding: '5px 8px', borderRadius: 6,
          background: updated ? '#f59e0b08' : '#0a1525',
          border: updated ? '1px solid #f59e0b33' : '1px solid #1e3a5f',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>{from}</div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ width: 24, height: 2, background: wire, borderRadius: 2, margin: '0 auto' }} />
            <div style={{ fontSize: 8, color: wire, marginTop: 1 }}>→</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>{to}</div>
          <div style={{ fontSize: 10, color: updated ? C.warn : '#475569', fontStyle: 'italic' }}>{note}</div>
        </div>
      );
    }

    function CompRow({ component, value, note, updated }) {
      return (
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
          alignItems: 'center', gap: 8, padding: '5px 8px', borderRadius: 6,
          background: updated ? '#f59e0b08' : '#0a1525',
          border: updated ? '1px solid #f59e0b33' : '1px solid #1e3a5f',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{component}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{value}</div>
          <div style={{ fontSize: 10, color: updated ? C.warn : '#475569', fontStyle: 'italic' }}>{note}</div>
        </div>
      );
    }

    const ComponentBox = ({ x, y, w, h, title, subtitle, bgColor = '#1e293b' }) => (
      <g transform={`translate(${x}, ${y})`}>
        <rect width={w} height={h} rx="16" fill={bgColor} stroke="#334155" strokeWidth="4" />
        <text x={w/2} y="45" fill="#f8fafc" fontSize="26" fontWeight="bold" textAnchor="middle">{title}</text>
        {subtitle && <text x={w/2} y="80" fill="#94a3b8" fontSize="18" textAnchor="middle">{subtitle}</text>}
      </g>
    );

    const Annotation = ({ x, y, text1, text2 }) => (
      <g transform={`translate(${x}, ${y})`} style={{ pointerEvents: 'none' }}>
        <path d="M 0 0 L -20 20 L -20 60 L 320 60 L 320 20 L 10 20 Z" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" strokeWidth="2" strokeDasharray="4,4" />
        <text x="10" y="38" fill="#fde68a" fontSize="15" fontWeight="bold">{text1}</text>
        {text2 && <text x="10" y="55" fill="#fef3c7" fontSize="13">{text2}</text>}
      </g>
    );

    const ResistorSVG = ({ x, y, label, vertical = false, color = "#94a3b8" }) => (
      <g>
        <g transform={`translate(${x}, ${y}) ${vertical ? 'rotate(90)' : ''}`}>
          <line x1="-36" y1="0" x2="-24" y2="0" stroke={color} strokeWidth="4" />
          <line x1="24" y1="0" x2="36" y2="0" stroke={color} strokeWidth="4" />
          <rect x="-24" y="-12" width="48" height="24" fill="#0f172a" stroke={color} strokeWidth="3" rx="3" />
          <path d="M -16 0 L -8 -6 L 0 6 L 8 -6 L 16 0" fill="none" stroke={color} strokeWidth="2" />
        </g>
        <rect x={x - 85} y={y - 45} width="170" height="28" fill="#020617" opacity="0.95" rx="6" stroke="#334155" strokeWidth="1" />
        <text x={x} y={y - 25} fill="#e2e8f0" fontSize="15" fontWeight="bold" textAnchor="middle">{label}</text>
      </g>
    );

    const CapacitorSVG = ({ x, y, label, vertical = false, color = "#22c55e" }) => (
      <g>
        <g transform={`translate(${x}, ${y}) ${vertical ? 'rotate(90)' : ''}`}>
          <line x1="-36" y1="0" x2="-10" y2="0" stroke={color} strokeWidth="4" />
          <line x1="10" y1="0" x2="36" y2="0" stroke={color} strokeWidth="4" />
          <line x1="-10" y1="-20" x2="-10" y2="20" stroke={color} strokeWidth="6" />
          <line x1="10" y1="-20" x2="10" y2="20" stroke={color} strokeWidth="6" />
        </g>
        <rect x={x + 35} y={y - 20} width={label.length * 9 + 15} height="36" fill="#020617" opacity="0.95" rx="8" stroke={color} strokeWidth="2" />
        <text x={x + 45} y={y + 5} fill={color} fontSize="17" fontWeight="bold">{label}</text>
      </g>
    );

    const DiodeSVG = ({ x, y, label, vertical = false }) => (
      <g>
        <g transform={`translate(${x}, ${y}) ${vertical ? 'rotate(-90)' : ''}`}>
          <line x1="-36" y1="0" x2="-14" y2="0" stroke="#94a3b8" strokeWidth="4" />
          <line x1="14" y1="0" x2="36" y2="0" stroke="#94a3b8" strokeWidth="4" />
          <polygon points="-14,-14 10,0 -14,14" fill="#1e293b" stroke="#94a3b8" strokeWidth="3" />
          <line x1="10" y1="-14" x2="10" y2="14" stroke="#94a3b8" strokeWidth="5" />
        </g>
        {!vertical ? (
          <g>
            <rect x={x - 80} y={y - 50} width="160" height="30" fill="#020617" opacity="0.95" rx="6" stroke="#94a3b8" strokeWidth="1" />
            <text x={x} y={y - 28} fill="#fca5a5" fontSize="15" fontWeight="bold" textAnchor="middle">{label}</text>
          </g>
        ) : (
          <g>
            <rect x={x + 35} y={y - 15} width={180} height="30" fill="#020617" opacity="0.95" rx="6" stroke="#94a3b8" strokeWidth="1" />
            <text x={x + 45} y={y + 6} fill="#fca5a5" fontSize="15" fontWeight="bold" textAnchor="start">{label}</text>
          </g>
        )}
      </g>
    );

    const ZenerDiodeSVG = ({ x, y, label, vertical = false }) => (
      <g>
        <g transform={`translate(${x}, ${y}) ${vertical ? 'rotate(-90)' : ''}`}>
          <line x1="-36" y1="0" x2="-14" y2="0" stroke="#94a3b8" strokeWidth="4" />
          <line x1="14" y1="0" x2="36" y2="0" stroke="#94a3b8" strokeWidth="4" />
          <polygon points="-14,-14 10,0 -14,14" fill="#1e293b" stroke="#94a3b8" strokeWidth="3" />
          <path d="M 10 -14 L 10 14 M 10 -14 L 2 -20 M 10 14 L 18 20" fill="none" stroke="#94a3b8" strokeWidth="4" />
        </g>
        {!vertical ? (
          <g>
            <rect x={x - 80} y={y - 50} width="160" height="30" fill="#020617" opacity="0.95" rx="6" stroke="#94a3b8" strokeWidth="1" />
            <text x={x} y={y - 28} fill="#fca5a5" fontSize="15" fontWeight="bold" textAnchor="middle">{label}</text>
          </g>
        ) : (
          <g>
            <rect x={x + 35} y={y - 15} width={180} height="30" fill="#020617" opacity="0.95" rx="6" stroke="#94a3b8" strokeWidth="1" />
            <text x={x + 45} y={y + 6} fill="#fca5a5" fontSize="15" fontWeight="bold" textAnchor="start">{label}</text>
          </g>
        )}
      </g>
    );

    const PinSVG = ({ x, y, label, isRight = false, color = "#fff" }) => (
      <g transform={`translate(${x}, ${y})`}>
        <circle cx="0" cy="0" r="10" fill="#0f172a" stroke={color} strokeWidth="3" />
        <circle cx="0" cy="0" r="4" fill={color} />
        <text x={isRight ? 24 : -24} y="6" fill="#f8fafc" fontSize="18" fontWeight="bold" textAnchor={isRight ? "start" : "end"}>
          {label}
        </text>
      </g>
    );

    const JunctionSVG = ({ x, y, color }) => (
      <circle cx={x} cy={y} r="8" fill={color} />
    );

    const WireSVG = ({ path, net, color, isDashed = false, label, labelPos, hoveredNet, setHoveredNet, showFlow }) => {
      const isHovered = hoveredNet === net;
      const isFlowing = showFlow && (hoveredNet === null || isHovered);
      return (
        <g onMouseEnter={() => setHoveredNet(net)} onMouseLeave={() => setHoveredNet(null)} style={{ cursor: 'pointer' }}>
          <path d={path} fill="none" stroke="transparent" strokeWidth="60" />
          <path d={path} fill="none" stroke={color} strokeWidth={isHovered ? 8 : 4} strokeDasharray={isDashed ? "12,12" : "none"} style={{ transition: 'all 0.3s' }} />
          {isFlowing && !isDashed && (
            <circle r="6" fill="#fff" style={{ pointerEvents: 'none' }}>
              <animateMotion dur={net === 'rpm' || net === 'pulse' ? '1.5s' : '4s'} repeatCount="indefinite" path={path} />
            </circle>
          )}
          {(isHovered || label) && labelPos && (
            <g transform={`translate(${labelPos.x}, ${labelPos.y})`} style={{ pointerEvents: 'none' }}>
              <rect x={-(label.length * 9) / 2 - 15} y="-20" width={(label.length * 9) + 30} height="40" fill="#0f172a" rx="8" stroke={isHovered ? color : "transparent"} strokeWidth="2" />
              <text x="0" y="6" fill={color} fontSize="16" fontWeight="bold" textAnchor="middle">{label}</text>
            </g>
          )}
        </g>
      );
    };

    function App() {
      const [tab, setTab] = useState(0);
      const [hoveredNet, setHoveredNet] = useState(null);
      const [showFlow, setShowFlow] = useState(false);

      const wrapperRef = useRef(null);
      const [transform, setTransform] = useState({ x: 20, y: 20, k: 0.35 });
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const el = wrapperRef.current;
        if (!el) return;
        const handleWheel = (e) => {
          e.preventDefault();
          setTransform(prev => {
            const scaleMultiplier = e.deltaY > 0 ? 0.85 : 1.15;
            const newK = Math.min(Math.max(prev.k * scaleMultiplier, 0.1), 3);
            const rect = el.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const newX = mouseX - (mouseX - prev.x) * (newK / prev.k);
            const newY = mouseY - (mouseY - prev.y) * (newK / prev.k);
            return { x: newX, y: newY, k: newK };
          });
        };
        el.addEventListener('wheel', handleWheel, { passive: false });
        return () => el.removeEventListener('wheel', handleWheel);
      }, [tab]);

      const handlePointerDown = (e) => {
        setIsDragging(true);
        setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
        e.currentTarget.setPointerCapture(e.pointerId);
      };
      const handlePointerMove = (e) => {
        if (!isDragging) return;
        setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
      };
      const handlePointerUp = (e) => {
        setIsDragging(false);
        e.currentTarget.releasePointerCapture(e.pointerId);
      };

      const zoomIn = () => setTransform(p => ({ ...p, k: Math.min(p.k * 1.25, 3) }));
      const zoomOut = () => setTransform(p => ({ ...p, k: Math.max(p.k * 0.8, 0.1) }));
      const resetZoom = () => setTransform({ x: 20, y: 20, k: 0.35 });

      const tabs = ['📋 ĐẤU NỐI', '🔩 LINH KIỆN', '🔌 GPIO', '⚠️ LƯU Ý', '🗺️ SƠ ĐỒ'];

      return (
        <div style={{ background: C.bg, minHeight: '100vh', padding: 16, fontFamily: 'monospace', color: '#e2e8f0' }}>
          <div style={{ maxWidth: tab === 4 ? '100%' : 900, margin: '0 auto', transition: 'max-width 0.3s ease' }}>

            <div style={{ marginBottom: 16, padding: '12px 16px', background: C.card, borderRadius: 10, border: '1px solid #1e3a5f' }}>
              <div style={{ fontSize: 16, fontWeight: 'bold', color: '#34d399', letterSpacing: 1 }}>
                ESP32-C3 SUPER MINI — HỆ THỐNG ALL-IN-ONE XE MÁY
              </div>
              <div style={{ fontSize: 11, color: '#475569', marginTop: 4 }}>
                RPM · Voltage · NTC · TM1637 · TTP223 · PC817 · Buck 5V
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px 14px', marginTop: 10, paddingTop: 10, borderTop: '1px solid #1e3a5f' }}>
                {[
                  [C.v12,'Dây +12V'], [C.v5,'Dây +5V'], [C.v33,'Dây +3.3V'],
                  [C.gnd,'Dây GND'], [C.rpm,'Dây RPM'], [C.volt,'Dây Volt ADC'],
                  [C.ntc,'Dây NTC ADC'], [C.led,'Dây TM1637'], [C.pulse,'Dây xung thô'],
                  [C.touch,'Dây Touch'],
                ].map(([col, lbl]) => (
                  <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <div style={{ width: 20, height: 3, background: col, borderRadius: 2 }} />
                    <span style={{ fontSize: 10, color: '#64748b' }}>{lbl}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: 'flex', gap: 6, marginBottom: 14, overflowX: 'auto', paddingBottom: 4 }}>
              {tabs.map((t, i) => (
                <button key={i} onClick={() => setTab(i)} style={{
                  padding: '8px 16px', borderRadius: 7, border: 'none', cursor: 'pointer',
                  fontFamily: 'monospace', fontWeight: 'bold', fontSize: 12,
                  background: tab === i ? '#1d4ed8' : '#0d1b2e',
                  color: tab === i ? '#fff' : '#475569',
                  borderBottom: tab === i ? '2px solid #60a5fa' : '2px solid transparent',
                  whiteSpace: 'nowrap', transition: 'all 0.2s'
                }}>{t}</button>
              ))}
            </div>

            {tab === 0 && (
              <div>
                <Section title="① NGUỒN" color={C.v12}>
                  <Row from={<><Tag color={C.v12}>Acquy +12V</Tag></>} to={<><Tag color={C.v12}>Buck IN+</Tag></>} wire={C.v12} note="Dây đỏ trực tiếp (sau khóa)" />
                  <Row from={<><Tag color={C.gnd}>Acquy GND</Tag></>} to={<><Tag color={C.gnd}>Buck IN−</Tag></>} wire={C.gnd} note="Dây đen trực tiếp" />
                  <Row from={<><Tag color={C.v5}>Buck OUT+ (5V)</Tag></>} to={<><Tag color={C.v5}>ESP32 chân 5V</Tag></>} wire={C.v5} note="Chỉnh vôn kế đúng 5V trước" />
                  <Row from={<><Tag color={C.gnd}>Buck OUT−</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="GND chung toàn mạch" />
                  <Row from={<><Tag color={C.v33}>ESP32 chân 3V3</Tag></>} to={<><Tag color={C.v33}>VCC TM1637</Tag><span style={{color:'#475569',fontSize:10}}>+</span><Tag color={C.v33}>VCC TTP223</Tag></>} wire={C.v33} note="3.3V nội bộ ESP32 cấp ra" />
                </Section>
                <Section title="② ĐO VOLTAGE (ADC) — GPIO0" color={C.volt}>
                  <Row from={<><Tag color={C.v12}>Acquy +12V</Tag></>} to={<><Tag color={C.v12}>R1 47kΩ đầu vào</Tag></>} wire={C.v12} note="Đầu vào cầu chia áp" />
                  <Row from={<><Tag color={C.v12}>R1 47kΩ đầu ra</Tag></>} to={<><Tag color={C.volt}>R2 10kΩ đầu vào</Tag><span style={{color:'#475569',fontSize:10}}>= điểm giữa</span></>} wire={C.volt} note="Điểm giữa = ADC vào" />
                  <Row from={<><Tag color={C.volt}>Điểm giữa (R1−R2)</Tag></>} to={<><Tag color={C.volt}>ESP32 GPIO0</Tag></>} wire={C.volt} note="Max ~2.9V khi acquy 17V ✅" />
                  <Row from={<><Tag color={C.volt}>Tụ 104 chân A</Tag></>} to={<><Tag color={C.volt}>Điểm giữa (R1−R2)</Tag></>} wire={C.volt} note="Song song R2, hàn sát nhau" />
                  <Row from={<><Tag color={C.gnd}>R2 đầu ra</Tag><span style={{color:'#475569',fontSize:10}}>+</span><Tag color={C.gnd}>Tụ 104 chân B</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="" />
                </Section>
                <Section title="③ ĐO NTC NHIỆT ĐỘ (ADC) — GPIO1" color={C.ntc}>
                  <Row from={<><Tag color={C.v33}>ESP32 chân 3V3</Tag></>} to={<><Tag color={C.v33}>R kéo 10kΩ đầu vào</Tag></>} wire={C.v33} note="Trở kéo lên 3.3V" />
                  <Row from={<><Tag color={C.ntc}>R kéo 10kΩ đầu ra</Tag></>} to={<><Tag color={C.ntc}>NTC đầu vào</Tag><span style={{color:'#475569',fontSize:10}}>= điểm giữa</span></>} wire={C.ntc} note="Điểm giữa = ADC vào" />
                  <Row from={<><Tag color={C.ntc}>Điểm giữa (R−NTC)</Tag></>} to={<><Tag color={C.ntc}>ESP32 GPIO1</Tag></>} wire={C.ntc} note="" />
                  <Row from={<><Tag color={C.ntc}>Tụ 104 chân A</Tag></>} to={<><Tag color={C.ntc}>Điểm giữa</Tag></>} wire={C.ntc} note="Song song NTC, hàn sát" />
                  <Row from={<><Tag color={C.gnd}>NTC đầu ra</Tag><span style={{color:'#475569',fontSize:10}}>+</span><Tag color={C.gnd}>Tụ 104 chân B</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="" />
                </Section>
                <Section title="④ ĐO RPM — GPIO5 (PC817 cách ly quang)" color={C.rpm}>
                  <Row from={<><Tag color={C.pulse}>Cuộn kích xe</Tag></>} to={<><Tag color={C.pulse}>R 1kΩ đầu vào</Tag></>} wire={C.pulse} note="Xung thô 8–40V" updated />
                  <Row from={<><Tag color={C.pulse}>R 1kΩ đầu ra</Tag></>} to={<><Tag color={C.pulse}>PC817 chân 1 (A)</Tag></>} wire={C.pulse} note="IF ≈ 10mA @ 12V ✅" updated />
                  <Row from={<><Tag color={C.pulse}>Zener 5.1V Cathode</Tag></>} to={<><Tag color={C.pulse}>PC817 chân 1 (A)</Tag></>} wire={C.pulse} note="⚡ MỚI: kẹp xung dương" updated />
                  <Row from={<><Tag color={C.gnd}>Zener 5.1V Anode</Tag></>} to={<><Tag color={C.gnd}>PC817 chân 2 (K)</Tag></>} wire={C.gnd} note="⚡ MỚI: song song LED opto" updated />
                  <Row from={<><Tag color={C.gnd}>PC817 chân 2 (K)</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="" />
                  <Row from={<><Tag color={C.pulse}>1N4007 Cathode (+)</Tag></>} to={<><Tag color={C.pulse}>Điểm nối R−PC817 chân 1</Tag></>} wire={C.pulse} note="Kẹp xung ÂM (Cathode lên)" />
                  <Row from={<><Tag color={C.gnd}>1N4007 Anode (−)</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="Xả xung âm xuống GND" />
                  <Row from={<><Tag color={C.v33}>ESP32 chân 3V3</Tag></>} to={<><Tag color={C.v33}>R pullup 10kΩ đầu vào</Tag></>} wire={C.v33} note="Kéo lên 3.3V cho chân 4(C)" />
                  <Row from={<><Tag color={C.rpm}>R pullup 10kΩ đầu ra</Tag></>} to={<><Tag color={C.rpm}>PC817 chân 4 (C)</Tag></>} wire={C.rpm} note="= điểm tín hiệu ra" />
                  <Row from={<><Tag color={C.gnd}>PC817 chân 3 (E)</Tag></>} to={<><Tag color={C.gnd}>GND chung</Tag></>} wire={C.gnd} note="" />
                  <Row from={<><Tag color={C.rpm}>PC817 chân 4 (C)</Tag></>} to={<><Tag color={C.rpm}>R bảo vệ 1kΩ → ESP32 GPIO5</Tag></>} wire={C.rpm} note="Tín hiệu 3.3V sạch ✅" />
                </Section>
                <Section title="⑤ HIỂN THỊ TM1637 — GPIO4 (CLK) + GPIO6 (DIO)" color={C.led}>
                  <Row from={<><Tag color={C.v33}>ESP32 chân 3V3</Tag></>} to={<><Tag color={C.v33}>TM1637 VCC</Tag></>} wire={C.v33} note="" />
                  <Row from={<><Tag color={C.gnd}>GND chung</Tag></>} to={<><Tag color={C.gnd}>TM1637 GND</Tag></>} wire={C.gnd} note="" />
                  <Row from={<><Tag color={C.led}>ESP32 GPIO4</Tag></>} to={<><Tag color={C.led}>TM1637 CLK</Tag></>} wire={C.led} note="" />
                  <Row from={<><Tag color={C.led}>ESP32 GPIO6</Tag></>} to={<><Tag color={C.led}>TM1637 DIO</Tag></>} wire={C.led} note="" />
                </Section>
                <Section title="⑥ CẢM BIẾN CHẠM TTP223 — GPIO7" color={C.touch}>
